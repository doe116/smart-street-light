<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | IoT Smart Street Light System</title>
  <link rel="icon" type="image/svg+xml" href="./public/favicon.svg">
  <link rel="icon" type="image/png" href="./public/favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles/index.css">
  <style>
    body {
      background: linear-gradient(135deg, #090d16 0%, #1e293b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #fff;
    }
    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 15px;
    }
    .login-glass-card {
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }
    .form-control-custom {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: #fff !important;
      border-radius: 12px;
      padding: 0.8rem 1rem;
      transition: all 0.2s ease;
    }
    .form-control-custom:focus {
      background: rgba(255, 255, 255, 0.08) !important;
      border-color: #38bdf8 !important;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.25) !important;
    }
    .btn-login {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      border: none;
      border-radius: 12px;
      padding: 0.8rem;
      font-weight: 700;
      transition: all 0.25s ease;
      box-shadow: 0 0 15px rgba(14, 165, 233, 0.3);
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(14, 165, 233, 0.5);
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    }
    .brand-logo {
      background: linear-gradient(135deg, #38bdf8, #0284c7);
      color: #fff;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      margin: 0 auto 1.5rem auto;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-glass-card text-center">
      <div class="brand-logo">
        <i class="bi bi-lightbulb-history-fill"></i>
      </div>
      <h2 class="mb-1" style="font-family: var(--font-display); font-weight: 800;">Welcome Back</h2>
      <p class="text-secondary mb-4" style="font-size: 0.95rem;">Smart Street Light Monitoring & Control</p>

      <form id="login-form" novalidate>
        <div class="mb-3 text-start">
          <label for="email" class="form-label text-secondary fw-semibold" style="font-size: 0.85rem;">Email Address</label>
          <input type="email" class="form-control form-control-custom" id="email" placeholder="name@domain.com" required>
        </div>
        <div class="mb-4 text-start">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label for="password" class="form-label text-secondary fw-semibold mb-0" style="font-size: 0.85rem;">Password</label>
          </div>
          <input type="password" class="form-control form-control-custom" id="password" placeholder="••••••••" required>
        </div>

        <div id="error-message" class="alert alert-danger d-none p-2 mb-3 text-start" style="font-size: 0.85rem; border-radius: 8px;">
          <i class="bi bi-exclamation-triangle-fill me-1"></i> <span id="error-text"></span>
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-login" id="submit-btn">
          <span class="spinner-border spinner-border-sm d-none me-2" id="login-spinner" role="status" aria-hidden="true"></span>
          Sign In as Admin
        </button>
      </form>
    </div>
  </div>

  <script type="module">
    import { authService } from './src/services/auth.js';

    // Check if session already exists
    window.addEventListener('DOMContentLoaded', async () => {
      const session = await authService.getSession();
      if (session) {
        window.location.href = 'index.html';
      }
    });

    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const errorMsg = document.getElementById('error-message');
    const errorText = document.getElementById('error-text');
    const spinner = document.getElementById('login-spinner');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showError('Please fill in all fields.');
        return;
      }

      hideError();
      setLoading(true);

      const { user, error } = await authService.login(email, password);

      setLoading(false);

      if (error) {
        showError(error.message || 'Invalid login credentials.');
      } else {
        window.location.href = 'index.html';
      }
    });

    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.remove('d-none');
    }

    function hideError() {
      errorMsg.classList.add('d-none');
    }

    function setLoading(isLoading) {
      if (isLoading) {
        spinner.classList.remove('d-none');
        submitBtn.disabled = true;
      } else {
        spinner.classList.add('d-none');
        submitBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
