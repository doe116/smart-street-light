<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IoT Smart Street Light Monitoring and Control System</title>
  
  <!-- Fonts and Style Libraries -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles/index.css">
</head>
<body>
  
  <!-- Dynamic Loading Overlay -->
  <div id="global-loader" class="position-fixed top-0 start-0 w-100 h-100 bg-dark d-flex align-items-center justify-content-center" style="z-index: 2000; opacity: 0.85; transition: opacity 0.3s ease;">
    <div class="text-center">
      <div class="spinner-border text-info" role="status" style="width: 3rem; height: 3rem;"></div>
      <p class="text-info mt-3 fw-bold" style="font-family: var(--font-display);">Synchronizing IoT System...</p>
    </div>
  </div>

  <div class="app-container">
    
    <!-- Sidebar Left Panel -->
    <aside class="sidebar" id="sidebar-container"></aside>
    
    <!-- Main Content Area Right Panel -->
    <div class="main-content">
      
      <!-- Topbar Header -->
      <header class="d-flex align-items-center justify-content-between mb-4 pb-3 border-bottom" style="border-color: var(--border-subtle) !important;">
        <div class="d-flex align-items-center gap-3">
          <!-- Mobile Sidebar Toggle -->
          <button class="btn btn-outline-secondary d-lg-none" id="mobile-sidebar-toggle">
            <i class="bi bi-list"></i>
          </button>
          <div>
            <h1 class="h3 mb-0" id="current-page-title" style="color: var(--text-primary);">Dashboard</h1>
            <p class="text-muted mb-0" style="font-size: 0.85rem;" id="current-page-subtitle">Real-time system telemetry and overrides</p>
          </div>
        </div>
        
        <!-- Header Actions (Heartbeat, Theme, Sync) -->
        <div class="d-flex align-items-center gap-3">
          <div class="glass-card d-flex align-items-center gap-2 py-2 px-3" style="border-radius: var(--radius-sm);">
            <span class="status-dot offline" id="system-heartbeat-dot"></span>
            <span class="fw-bold" style="font-size: 0.85rem; color: var(--text-primary);" id="system-heartbeat-text">ESP32: OFFLINE</span>
          </div>
          
          <div id="theme-toggler-container"></div>
        </div>
      </header>
      
      <!-- Dynamic Content Injection Target -->
      <section id="page-content" class="flex-grow-1"></section>
      
    </div>
  </div>

  <!-- Custom Custom Toast Notification Wrapper -->
  <div class="toast-container-custom" id="toast-container"></div>

  <!-- Bootstrap Bundle Script -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Main Application Script (Router) -->
  <script type="module" src="./src/main.js"></script>
</body>
</html>
